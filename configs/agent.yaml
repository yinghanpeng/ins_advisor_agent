# 文件说明：
# - 本配置文件用于描述运行时参数，避免把环境差异硬编码在 Python 代码中。
# - 修改配置后建议运行 python3 main.py 和 python3 -m pytest 做回归验证。

# agent 是 Agent Core 的全局运行配置。
agent:
  # name 用于日志、部署和文档中标识当前 Agent 框架。
  name: production_agent_framework
  # default_workflow 是没有显式指定 workflow_name 时使用的主工作流。
  default_workflow: universal_agent_workflow
  # default_domain_skill 是业务请求默认命中的领域 Skill。
  default_domain_skill: insurance_advisor
  # trace_required 表示每次请求都必须产生 trace_id 和 trace_events。
  trace_required: true
  # local_logs_required 表示即使 LangSmith 不可用，也必须写本地结构化日志。
  local_logs_required: true
  # langsmith_required=false 表示 LangSmith 是增强观测能力，不是运行硬依赖。
  langsmith_required: false

# gateway 描述 API 网关层的安全边界和公开接口。
gateway:
  # public_endpoints 是计划公开的 HTTP endpoint 清单。
  public_endpoints:
    # /agent/run 执行一次 Agent 请求。
    - /agent/run
    # /agent/stream 预留流式响应接口。
    - /agent/stream
    # /agent/state 预留状态查询接口。
    - /agent/state
    # /agent/trace 预留 trace 查询接口。
    - /agent/trace
    # /agent/eval 预留评估接口。
    - /agent/eval
  # auth_required=true 表示生产环境必须补鉴权。
  auth_required: true
  # tenant_isolation=true 表示所有 memory/RAG/tool 都必须按租户隔离。
  tenant_isolation: true
  # rate_limit_per_minute 是网关级限流建议值。
  rate_limit_per_minute: 60

# runtime 描述本地运行时后端和默认容错参数。
runtime:
  # state_backend=memory 表示本地 demo 用内存状态，生产可替换数据库/Redis。
  state_backend: memory
  # checkpoint_backend=memory 表示 checkpoint 也使用内存实现。
  checkpoint_backend: memory
  # max_retries 限制自动重试次数。
  max_retries: 2
  # default_timeout_seconds 是通用 step 或工具默认超时。
  default_timeout_seconds: 30
