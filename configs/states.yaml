# 文件说明：
# - 本配置文件用于描述运行时参数，避免把环境差异硬编码在 Python 代码中。
# - 修改配置后建议运行 python3 main.py 和 python3 -m pytest 做回归验证。

# states 列出 Agent 允许出现的显式状态；应与 AgentNode 枚举保持同步。
states:
  # IDLE：请求尚未开始处理。
  - IDLE
  # GREETING：用户只是问候或询问 Agent 能力。
  - GREETING
  # CLASSIFY_INTENT：识别用户意图。
  - CLASSIFY_INTENT
  # ROUTE_CAPABILITY：按意图路由到通用能力、业务 Skill 或人审。
  - ROUTE_CAPABILITY
  # GENERAL_TOOL_ROUTING：为通用能力请求选择工具。
  - GENERAL_TOOL_ROUTING
  # GENERAL_TOOL_CALL：执行工具调用。
  - GENERAL_TOOL_CALL
  # VERIFY_TOOL_RESULT：校验工具结果是否成功。
  - VERIFY_TOOL_RESULT
  # GENERAL_RESPONSE_GENERATION：基于通用能力生成回答。
  - GENERAL_RESPONSE_GENERATION
  # DOMAIN_WORKFLOW_ROUTING：进入保险顾问等业务工作流。
  - DOMAIN_WORKFLOW_ROUTING
  # SALES_INTELLIGENCE_ROUTING：路由到销售智能子链路。
  - SALES_INTELLIGENCE_ROUTING
  # SALES_CORPUS_INGESTION：导入原始销售访谈语料。
  - SALES_CORPUS_INGESTION
  # SALES_INSIGHT_EXTRACTION：从访谈片段抽取结构化销售洞察。
  - SALES_INSIGHT_EXTRACTION
  # SALES_INSIGHT_RETRIEVAL：检索已审核销售洞察。
  - SALES_INSIGHT_RETRIEVAL
  # COLLECT_REQUIREMENTS：信息不足时向用户补问。
  - COLLECT_REQUIREMENTS
  # UPDATE_STATE：把用户补充信息写回状态。
  - UPDATE_STATE
  # PLAN_TASK：复杂任务规划。
  - PLAN_TASK
  # RETRIEVE_CONTEXT：检索 RAG、记忆或外部事实。
  - RETRIEVE_CONTEXT
  # BUILD_CONTEXT：构建模型上下文。
  - BUILD_CONTEXT
  # GENERATE_RESPONSE：生成回答。
  - GENERATE_RESPONSE
  # COMPLIANCE_REVIEW：输出前做合规审查。
  - COMPLIANCE_REVIEW
  # HUMAN_APPROVAL：等待人工审批。
  - HUMAN_APPROVAL
  # RECOVERY：进入重试、降级或恢复逻辑。
  - RECOVERY
  # FINAL：正常结束。
  - FINAL
  # ERROR：异常或安全阻断结束。
  - ERROR
