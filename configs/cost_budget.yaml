# 文件说明：
# - 本配置文件用于描述运行时参数，避免把环境差异硬编码在 Python 代码中。
# - 修改配置后建议运行 python3 main.py 和 python3 -m pytest 做回归验证。

cost_budget:
  daily_token_budget: 200000
  request_token_budget: 12000
  sales_intelligence_retrieval_budget: 3000
  max_tool_calls_per_request: 5
  max_model_calls_per_request: 6
  budget_pressure_strategy:
    - reduce_top_k
    - skip_optional_news
    - use_compact_context
    - return_partial_with_limit_notice

