# 文件说明：
# - 本配置文件用于描述运行时参数，避免把环境差异硬编码在 Python 代码中。
# - 修改配置后建议运行 python3 main.py 和 python3 -m pytest 做回归验证。

# rag 定义知识切分、召回、重排和证据摘要的默认策略。
rag:
  # default_retriever 指定默认使用 PostgreSQL + pgvector 的混合检索器。
  default_retriever: postgres_pgvector_hybrid
  # chunk_size 是知识入库时每个文本块的目标字符数量。
  chunk_size: 800
  # chunk_overlap 是相邻文本块之间保留的重叠字符数量，减少语义断裂。
  chunk_overlap: 120
  # top_k 是初次召回阶段最多保留的候选块数量。
  top_k: 8
  # rerank_top_k 是重排后最多进入证据上下文的候选块数量。
  rerank_top_k: 5
  # evidence_digest_max_chars 限制融合后证据摘要的最大字符数。
  evidence_digest_max_chars: 1800
  # source_boundary_policy 明确外部内容只能作为证据，不能提升为系统指令。
  source_boundary_policy: external_content_is_evidence_not_instruction
