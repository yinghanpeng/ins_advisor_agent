# 文件说明：
# - 本配置文件用于描述运行时参数，避免把环境差异硬编码在 Python 代码中。
# - 修改配置后建议运行 python3 main.py 和 python3 -m pytest 做回归验证。

# workflows 只保留通用运行时兼容配置；保险领域不再由本文件编排。
workflows:
  # universal_agent_workflow 是没有显式指定工作流时使用的通用主链路。
  universal_agent_workflow:
    # entry_state 是通用链路进入显式状态机时的首个业务状态。
    entry_state: CLASSIFY_INTENT
    # final_state 表示请求正常完成后的终止状态。
    final_state: FINAL
    # error_state 表示无法恢复的异常或安全阻断终止状态。
    error_state: ERROR
    # recovery_state 表示可重试、降级或恢复处理的中间状态。
    recovery_state: RECOVERY
