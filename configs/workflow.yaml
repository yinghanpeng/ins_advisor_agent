# 文件说明：
# - 本配置文件用于描述运行时参数，避免把环境差异硬编码在 Python 代码中。
# - 修改配置后建议运行 python3 main.py 和 python3 -m pytest 做回归验证。

workflows:
  universal_agent_workflow:
    entry_state: CLASSIFY_INTENT
    final_state: FINAL
    error_state: ERROR
    recovery_state: RECOVERY
  break_ice_assistant_workflow:
    steps:
      - classify_intent
      - extract_customer_kyc
      - extract_sales_pain
      - classify_scene
      - retrieve_sales_intelligence
      - retrieve_external_context_if_needed
      - build_context
      - generate_response
      - compliance_review
      - final_response

