# 文件说明：
# - 本配置文件用于描述运行时参数，避免把环境差异硬编码在 Python 代码中。
# - 修改配置后建议运行 python3 main.py 和 python3 -m pytest 做回归验证。

# guardrails 汇总输入、语料、输出和动作层的安全策略开关。
guardrails:
  # input 控制用户原始输入进入业务链路前执行的检测项目。
  input:
    # prompt_injection 启用提示词注入、越权和结构化攻击信号检测。
    prompt_injection: true
    # sensitive_info_detection 启用手机号、邮箱、证件号等敏感信息识别。
    sensitive_info_detection: true
    # high_risk_request_detection 启用保险业务违规与高风险动作识别。
    high_risk_request_detection: true
  # sales_corpus 约束销售访谈语料从导入到生成使用的安全边界。
  sales_corpus:
    # raw_interview_as_instruction=false 表示原始访谈只能作为数据，不能作为模型指令。
    raw_interview_as_instruction: false
    # output_high_risk_scripts=false 禁止生成未通过自动合规准入的高风险销售话术。
    output_high_risk_scripts: false
    # require_desensitization 要求访谈语料进入索引或 trace 前完成脱敏。
    require_desensitization: true
  # output 控制最终回答包装前的结构和保险合规检查。
  output:
    # schema_validation 要求输出符合 response_package 等约定结构。
    schema_validation: true
    # no_yield_promises 禁止承诺收益、保本或确定性投资回报。
    no_yield_promises: true
    # no_tax_or_debt_evasion 禁止提供逃税、逃债或规避监管方案。
    no_tax_or_debt_evasion: true
    # no_fear_marketing 禁止使用恐惧、灾难暗示等方式操纵客户决策。
    no_fear_marketing: true
    # no_unverified_case_stories 禁止把未经核实的案例包装为真实成功故事。
    no_unverified_case_stories: true
    # no_product_disparagement 禁止通过贬损其他金融或保险产品促成销售。
    no_product_disparagement: true
  # actions 定义命中安全策略后由状态机执行的动作，而不只是记录告警。
  actions:
    # high_risk 直接阻断原操作并返回同步安全降级说明。
    high_risk: safe_fallback
    # unsafe_output 对不安全输出优先重写，无法安全重写时阻断。
    unsafe_output: rewrite_or_block
