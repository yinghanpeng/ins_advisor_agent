# 文件说明：
# - 本配置文件用于描述运行时参数，避免把环境差异硬编码在 Python 代码中。
# - 修改配置后建议运行 python3 main.py 和 python3 -m pytest 做回归验证。

tools:
  - name: web_search
    description: Search the public web through an approved provider.
    risk_level: medium
    side_effect: false
    requires_approval: false
    retryable: true
    timeout_seconds: 10
    idempotency_required: false
    permission_scope: internet.read
  - name: web_page_reader
    description: Read and summarize a specific URL.
    risk_level: medium
    side_effect: false
    requires_approval: false
    retryable: true
    timeout_seconds: 10
    idempotency_required: false
    permission_scope: internet.read
  - name: weather_query
    description: Query weather for a location.
    risk_level: low
    side_effect: false
    requires_approval: false
    retryable: true
    timeout_seconds: 5
    idempotency_required: false
    permission_scope: weather.read
  - name: time_query
    description: Return current date/time information.
    risk_level: low
    side_effect: false
    requires_approval: false
    retryable: false
    timeout_seconds: 2
    idempotency_required: false
    permission_scope: local.time
  - name: calculator
    description: Evaluate safe arithmetic expressions.
    risk_level: low
    side_effect: false
    requires_approval: false
    retryable: false
    timeout_seconds: 2
    idempotency_required: false
    permission_scope: local.compute
  - name: unit_converter
    description: Convert supported units.
    risk_level: low
    side_effect: false
    requires_approval: false
    retryable: false
    timeout_seconds: 2
    idempotency_required: false
    permission_scope: local.compute
  - name: file_parser
    description: Parse approved uploaded files.
    risk_level: medium
    side_effect: false
    requires_approval: false
    retryable: false
    timeout_seconds: 15
    idempotency_required: false
    permission_scope: files.read
  - name: knowledge_search
    description: Search internal knowledge indexes.
    risk_level: low
    side_effect: false
    requires_approval: false
    retryable: true
    timeout_seconds: 10
    idempotency_required: false
    permission_scope: knowledge.read
  - name: news_search
    description: Search recent news through approved providers.
    risk_level: medium
    side_effect: false
    requires_approval: false
    retryable: true
    timeout_seconds: 10
    idempotency_required: false
    permission_scope: internet.read
  - name: translation
    description: Translate text between supported languages.
    risk_level: low
    side_effect: false
    requires_approval: false
    retryable: true
    timeout_seconds: 10
    idempotency_required: false
    permission_scope: llm.transform
  - name: summarizer
    description: Summarize provided text.
    risk_level: low
    side_effect: false
    requires_approval: false
    retryable: true
    timeout_seconds: 10
    idempotency_required: false
    permission_scope: llm.transform

