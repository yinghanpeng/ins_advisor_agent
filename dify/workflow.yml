# 文件说明：
# - 本配置文件用于描述运行时参数，避免把环境差异硬编码在 Python 代码中。
# - 修改配置后建议运行 python3 main.py 和 python3 -m pytest 做回归验证。

app:
  name: 生产级 Agent Control Plane
  mode: advanced-chat
  description: Dify 作为控制平面，通过 HTTP 调用 FastAPI Agent Core，不直接承担生产运行时。
workflow:
  variables:
    - name: agent_core_url
      default: http://localhost:8000/agent/run
    - name: domain_skill
      default: insurance_advisor
  recommended_nodes:
    - intent_router
    - capability_router
    - state_updater
    - workflow_router
    - sales_intelligence_router
    - general_tool_router
    - domain_tool_router
    - tool_result_verifier
    - context_builder
    - strategy_generator
    - compliance_reviewer
    - final_response
  data_plane_call:
    method: POST
    url: "{{ agent_core_url }}"
    body:
      input: "{{ sys.query }}"
      session_id: "{{ conversation.id }}"
      domain_skill: "{{ domain_skill }}"
      metadata:
        source: dify
